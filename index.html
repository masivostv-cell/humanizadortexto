<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Humanizador de Texto con IA</title>
    <!-- Tailwind CSS para los estilos -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons para los iconos -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* Estilos personalizados sutiles */
        body {
            background-color: #f8fafc;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
        }
        /* Animación de carga */
        .loader {
            border: 3px solid #f3f3f3;
            border-radius: 50%;
            border-top: 3px solid #3b82f6;
            width: 20px;
            height: 20px;
            -webkit-animation: spin 1s linear infinite; /* Safari */
            animation: spin 1s linear infinite;
            display: inline-block;
            vertical-align: middle;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="min-h-screen text-slate-800 p-4 md:p-8">

    <div class="max-w-4xl mx-auto">
        <!-- Encabezado -->
        <header class="text-center mb-10 mt-6">
            <h1 class="text-4xl font-extrabold text-slate-900 mb-3 tracking-tight flex items-center justify-center gap-3">
                <i data-lucide="sparkles" class="text-blue-500 w-8 h-8"></i>
                Humanizador de Texto
            </h1>
            <p class="text-slate-500 text-lg max-w-2xl mx-auto">
                Transforma textos robóticos generados por IA en contenido natural, fluido y 100% humano.
            </p>
        </header>

        <!-- Contenedor Principal -->
        <main class="glass-panel rounded-2xl p-6 md:p-8 border border-slate-100">
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                
                <!-- Columna Izquierda: Entrada de datos -->
                <div class="flex flex-col gap-4">
                    <div>
                        <label for="inputText" class="block text-sm font-semibold text-slate-700 mb-2 flex items-center gap-2">
                            <i data-lucide="file-text" class="w-4 h-4"></i> Texto Original (IA)
                        </label>
                        <textarea id="inputText" rows="8" 
                            class="w-full rounded-xl border border-slate-200 p-4 text-slate-700 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all resize-none outline-none"
                            placeholder="Pega aquí el texto generado por ChatGPT, Gemini, etc..."></textarea>
                    </div>

                    <!-- Controles de Configuración -->
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label for="toneSelect" class="block text-sm font-semibold text-slate-700 mb-2">Tono</label>
                            <select id="toneSelect" class="w-full rounded-lg border border-slate-200 p-2.5 text-slate-700 focus:ring-2 focus:ring-blue-500 outline-none bg-white">
                                <option value="casual">Casual / Relajado</option>
                                <option value="profesional">Profesional</option>
                                <option value="blog">Estilo Blog / Artículo</option>
                                <option value="academico">Académico (Pero natural)</option>
                            </select>
                        </div>
                        <div>
                            <label for="levelSlider" class="block text-sm font-semibold text-slate-700 mb-2">
                                Nivel de Humanización: <span id="levelValue" class="text-blue-600 font-bold">8</span>
                            </label>
                            <input type="range" id="levelSlider" min="1" max="10" value="8" class="w-full h-2 bg-slate-200 rounded-lg appearance-none cursor-pointer mt-2">
                            <div class="flex justify-between text-xs text-slate-400 mt-1">
                                <span>Ligero</span>
                                <span>Extremo</span>
                            </div>
                        </div>
                    </div>

                    <!-- Botón de Acción -->
                    <button id="humanizeBtn" onclick="procesarTexto()" 
                        class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3.5 px-6 rounded-xl transition-colors shadow-sm flex justify-center items-center gap-2 mt-2">
                        <i data-lucide="wand-2" class="w-5 h-5"></i>
                        <span>Humanizar Texto</span>
                    </button>
                    
                    <!-- Mensaje de error/estado -->
                    <div id="statusMessage" class="hidden text-sm p-3 rounded-lg mt-2 text-center font-medium"></div>
                </div>

                <!-- Columna Derecha: Resultado -->
                <div class="flex flex-col gap-4">
                    <div class="flex justify-between items-end mb-2">
                        <label class="block text-sm font-semibold text-slate-700 flex items-center gap-2">
                            <i data-lucide="user-check" class="w-4 h-4 text-green-500"></i> Texto Humanizado
                        </label>
                        <button onclick="copiarAlPortapapeles()" id="copyBtn" class="text-sm text-slate-500 hover:text-blue-600 flex items-center gap-1 transition-colors hidden">
                            <i data-lucide="copy" class="w-4 h-4"></i> Copiar
                        </button>
                    </div>
                    
                    <!-- Área de Resultado -->
                    <div id="resultArea" class="w-full h-full min-h-[250px] rounded-xl border border-slate-200 bg-slate-50 p-4 text-slate-700 relative overflow-y-auto">
                        <p id="placeholderText" class="text-slate-400 italic text-center absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 w-full">
                            El resultado aparecerá aquí...
                        </p>
                        <div id="outputText" class="hidden whitespace-pre-wrap"></div>
                    </div>
                </div>
                
            </div>
        </main>
        
        <footer class="text-center mt-8 text-slate-400 text-sm">
            <p>Impulsado por Gemini AI</p>
        </footer>
    </div>

    <script>
        // Inicializar iconos
        lucide.createIcons();

        // En el entorno de Canvas, la clave se provee automáticamente.
        // Si descargas esto para tu propio servidor, aquí va tu clave generada en Google AI Studio.
        const apiKey = ""; 
        const modeloIA = "gemini-2.5-flash-preview-09-2025";
        const API_URL = `https://generativelanguage.googleapis.com/v1beta/models/${modeloIA}:generateContent?key=${apiKey}`;

        // Elementos del DOM
        const levelSlider = document.getElementById('levelSlider');
        const levelValue = document.getElementById('levelValue');
        const inputText = document.getElementById('inputText');
        const toneSelect = document.getElementById('toneSelect');
        const humanizeBtn = document.getElementById('humanizeBtn');
        const outputText = document.getElementById('outputText');
        const placeholderText = document.getElementById('placeholderText');
        const copyBtn = document.getElementById('copyBtn');
        const statusMessage = document.getElementById('statusMessage');
        const resultArea = document.getElementById('resultArea');

        // Actualizar el valor numérico del slider
        levelSlider.addEventListener('input', function() {
            levelValue.textContent = this.value;
        });

        // Función principal
        async function procesarTexto() {
            const textoOriginal = inputText.value.trim();
            const tono = toneSelect.options[toneSelect.selectedIndex].text;
            const nivel = levelSlider.value;

            if (textoOriginal.length < 10) {
                mostrarMensaje("El texto es demasiado corto. Por favor, escribe un poco más.", "error");
                return;
            }

            // Preparar UI para carga
            estadoCargando(true);
            mostrarMensaje("", "none");

            // Configurar el prompt del sistema
            const systemPrompt = `Eres un experto redactor humano y copywriter. Tu tarea es reescribir el texto generado por IA para que suene 100% escrito por una persona real, evadiendo cualquier detector de inteligencia artificial.

Aplica las siguientes reglas estrictas:
1. TONO: El tono debe ser '${tono}'.
2. VARIACIÓN (Burstiness): Varía drásticamente la longitud de las oraciones. Usa oraciones cortas. Luego usa oraciones más largas y fluidas.
3. IMPREVISIBILIDAD (Perplexity): Usa sinónimos poco comunes pero naturales. Evita transiciones robóticas o cliché de IA como "En conclusión", "En resumen", "Es importante destacar", "Por lo tanto", "En el vertiginoso mundo de".
4. NATURALIDAD: Introduce ligeras imperfecciones conversacionales o conectores naturales ("Bueno,", "La verdad es que", "Y sí,").
5. NIVEL DE EXPRESIÓN: Nivel ${nivel}/10 de libertad creativa.

Devuelve ÚNICAMENTE el texto reescrito.`;

            const userQuery = `Reescribe el siguiente texto basándote en las instrucciones:\n\n${textoOriginal}`;

            const payload = {
                contents: [{ parts: [{ text: userQuery }] }],
                systemInstruction: { parts: [{ text: systemPrompt }] }
            };

            try {
                // Ejecutamos la petición con la lógica de reintentos recomendada
                const responseData = await fetchConReintentos(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                // Extraer el texto de la respuesta
                const textoFinal = responseData.candidates?.[0]?.content?.parts?.[0]?.text;

                if (textoFinal) {
                    mostrarResultado(textoFinal);
                    mostrarMensaje("¡Texto humanizado con éxito!", "success");
                } else {
                    throw new Error("Respuesta inválida o vacía de la IA.");
                }

            } catch (error) {
                estadoCargando(false);
                mostrarMensaje(`⚠️ Error al procesar: ${error.message}`, "error");
            }
        }

        // Función para reintentos exponenciales con extracción de error precisa
        async function fetchConReintentos(url, options, maxReintentos = 5) {
            const tiemposDeEspera = [1000, 2000, 4000, 8000, 16000];
            
            for (let i = 0; i < maxReintentos; i++) {
                try {
                    const response = await fetch(url, options);
                    
                    if (!response.ok) {
                        let errorMsg = `HTTP Error ${response.status}`;
                        try {
                            const errorData = await response.json();
                            if (errorData.error && errorData.error.message) {
                                errorMsg = errorData.error.message;
                            }
                        } catch (e) {
                            // Si no se puede parsear como JSON, usar el texto genérico
                        }
                        throw new Error(errorMsg);
                    }
                    
                    return await response.json();
                    
                } catch (error) {
                    if (i === maxReintentos - 1) throw error;
                    // Esperar antes del siguiente reintento
                    await new Promise(resolve => setTimeout(resolve, tiemposDeEspera[i]));
                }
            }
        }

        // Utilidades de la Interfaz de Usuario
        function estadoCargando(cargando) {
            if (cargando) {
                humanizeBtn.disabled = true;
                humanizeBtn.innerHTML = '<span class="loader"></span><span>Procesando...</span>';
                humanizeBtn.classList.replace('bg-blue-600', 'bg-blue-400');
                placeholderText.classList.remove('hidden');
                placeholderText.textContent = "Analizando y humanizando tu texto...";
                outputText.classList.add('hidden');
                copyBtn.classList.add('hidden');
                resultArea.classList.remove('bg-white');
                resultArea.classList.add('bg-slate-50');
            } else {
                humanizeBtn.disabled = false;
                humanizeBtn.innerHTML = '<i data-lucide="wand-2" class="w-5 h-5"></i><span>Humanizar Texto</span>';
                humanizeBtn.classList.replace('bg-blue-400', 'bg-blue-600');
                lucide.createIcons();
            }
        }

        function mostrarResultado(texto) {
            estadoCargando(false);
            placeholderText.classList.add('hidden');
            outputText.textContent = texto;
            outputText.classList.remove('hidden');
            copyBtn.classList.remove('hidden');
            resultArea.classList.remove('bg-slate-50');
            resultArea.classList.add('bg-white');
        }

        function mostrarMensaje(texto, tipo) {
            if (tipo === "none") {
                statusMessage.classList.add('hidden');
                return;
            }
            
            statusMessage.textContent = texto;
            statusMessage.classList.remove('hidden', 'bg-red-100', 'text-red-700', 'bg-green-100', 'text-green-700', 'bg-orange-100', 'text-orange-700');
            
            if (tipo === "error") {
                statusMessage.classList.add('bg-red-100', 'text-red-700');
            } else if (tipo === "success") {
                statusMessage.classList.add('bg-green-100', 'text-green-700');
                setTimeout(() => {
                    if(statusMessage.textContent === texto) {
                        statusMessage.classList.add('hidden');
                    }
                }, 5000);
            } else if (tipo === "warning") {
                statusMessage.classList.add('bg-orange-100', 'text-orange-700');
            }
        }

        function copiarAlPortapapeles() {
            const textoCopia = outputText.textContent;
            const areaTemporal = document.createElement("textarea");
            areaTemporal.value = textoCopia;
            document.body.appendChild(areaTemporal);
            areaTemporal.select();
            
            try {
                document.execCommand('copy');
                const originalHTML = copyBtn.innerHTML;
                copyBtn.innerHTML = '<i data-lucide="check" class="w-4 h-4 text-green-600"></i> <span class="text-green-600">¡Copiado!</span>';
                lucide.createIcons();
                
                setTimeout(() => {
                    copyBtn.innerHTML = originalHTML;
                    lucide.createIcons();
                }, 2000);
            } catch (err) {
                mostrarMensaje("No se pudo copiar el texto", "error");
            }
            
            document.body.removeChild(areaTemporal);
        }
    </script>
</body>
</html>
