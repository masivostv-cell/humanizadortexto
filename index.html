<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kit de IA: Humanizador y Detector</title>
    <!-- Tailwind CSS para los estilos -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons para los iconos -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* Estilos personalizados sutiles */
        body {
            background-color: #f8fafc;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
        }
        /* Animación de carga */
        .loader {
            border: 3px solid #f3f3f3;
            border-radius: 50%;
            border-top: 3px solid #3b82f6;
            width: 20px;
            height: 20px;
            -webkit-animation: spin 1s linear infinite;
            animation: spin 1s linear infinite;
            display: inline-block;
            vertical-align: middle;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        /* Transiciones suaves para las pestañas */
        .tab-content {
            display: none;
            animation: fadeIn 0.3s ease-in-out;
        }
        .tab-content.active {
            display: block;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="min-h-screen text-slate-800 p-4 md:p-8">

    <div class="max-w-4xl mx-auto">
        <!-- Encabezado -->
        <header class="text-center mb-8 mt-4">
            <h1 class="text-4xl font-extrabold text-slate-900 mb-3 tracking-tight flex items-center justify-center gap-3">
                <i data-lucide="brain-circuit" class="text-blue-500 w-10 h-10"></i>
                Kit de Texto con IA
            </h1>
            <p class="text-slate-500 text-lg max-w-2xl mx-auto">
                Analiza textos para detectar Inteligencia Artificial y transfórmalos para que suenen 100% humanos.
            </p>
        </header>

        <!-- Navegación de Pestañas -->
        <div class="flex justify-center gap-4 mb-6">
            <button onclick="switchTab('humanizer')" id="btnHumanizer" class="flex items-center gap-2 px-6 py-2.5 rounded-full font-bold bg-blue-600 text-white shadow-md transition-all">
                <i data-lucide="wand-2" class="w-4 h-4"></i> Humanizador
            </button>
            <button onclick="switchTab('detector')" id="btnDetector" class="flex items-center gap-2 px-6 py-2.5 rounded-full font-bold bg-white text-slate-600 border border-slate-200 hover:bg-slate-50 transition-all">
                <i data-lucide="search" class="w-4 h-4"></i> Detector de IA
            </button>
        </div>

        <!-- Contenedor Principal -->
        <main class="glass-panel rounded-2xl p-6 md:p-8 border border-slate-100">
            
            <!-- ========================================== -->
            <!-- PESTAÑA 1: HUMANIZADOR DE TEXTO            -->
            <!-- ========================================== -->
            <div id="humanizerTab" class="tab-content active">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                    
                    <!-- Columna Izquierda: Entrada de datos -->
                    <div class="flex flex-col gap-4">
                        <div>
                            <label for="inputText" class="block text-sm font-semibold text-slate-700 mb-2 flex items-center gap-2">
                                <i data-lucide="file-text" class="w-4 h-4"></i> Texto Original (IA)
                            </label>
                            <textarea id="inputText" rows="8" 
                                class="w-full rounded-xl border border-slate-200 p-4 text-slate-700 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all resize-none outline-none"
                                placeholder="Pega aquí el texto que deseas humanizar..."></textarea>
                        </div>

                        <!-- Controles de Configuración -->
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label for="toneSelect" class="block text-sm font-semibold text-slate-700 mb-2">Tono</label>
                                <select id="toneSelect" class="w-full rounded-lg border border-slate-200 p-2.5 text-slate-700 focus:ring-2 focus:ring-blue-500 outline-none bg-white">
                                    <option value="casual">Casual / Relajado</option>
                                    <option value="profesional">Profesional</option>
                                    <option value="blog">Estilo Blog / Artículo</option>
                                    <option value="academico">Académico (Pero natural)</option>
                                </select>
                            </div>
                            <div>
                                <label for="levelSlider" class="block text-sm font-semibold text-slate-700 mb-2">
                                    Nivel de Humanización: <span id="levelValue" class="text-blue-600 font-bold">8</span>
                                </label>
                                <input type="range" id="levelSlider" min="1" max="10" value="8" class="w-full h-2 bg-slate-200 rounded-lg appearance-none cursor-pointer mt-2">
                                <div class="flex justify-between text-xs text-slate-400 mt-1">
                                    <span>Ligero</span>
                                    <span>Extremo</span>
                                </div>
                            </div>
                        </div>

                        <!-- Botón de Acción -->
                        <button id="humanizeBtn" onclick="procesarTexto()" 
                            class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3.5 px-6 rounded-xl transition-colors shadow-sm flex justify-center items-center gap-2 mt-2">
                            <i data-lucide="wand-2" class="w-5 h-5"></i>
                            <span>Humanizar Texto</span>
                        </button>
                        
                        <!-- Mensaje de error/estado -->
                        <div id="statusMessage" class="hidden text-sm p-3 rounded-lg mt-2 text-center font-medium"></div>
                    </div>

                    <!-- Columna Derecha: Resultado -->
                    <div class="flex flex-col gap-4">
                        <div class="flex justify-between items-end mb-2">
                            <label class="block text-sm font-semibold text-slate-700 flex items-center gap-2">
                                <i data-lucide="user-check" class="w-4 h-4 text-green-500"></i> Texto Humanizado
                            </label>
                            <button onclick="copiarAlPortapapeles('outputText', 'copyBtn')" id="copyBtn" class="text-sm text-slate-500 hover:text-blue-600 flex items-center gap-1 transition-colors hidden">
                                <i data-lucide="copy" class="w-4 h-4"></i> Copiar
                            </button>
                        </div>
                        
                        <!-- Área de Resultado -->
                        <div id="resultArea" class="w-full h-full min-h-[250px] rounded-xl border border-slate-200 bg-slate-50 p-4 text-slate-700 relative overflow-y-auto">
                            <p id="placeholderText" class="text-slate-400 italic text-center absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 w-full">
                                El resultado aparecerá aquí...
                            </p>
                            <div id="outputText" class="hidden whitespace-pre-wrap"></div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- ========================================== -->
            <!-- PESTAÑA 2: DETECTOR DE IA                  -->
            <!-- ========================================== -->
            <div id="detectorTab" class="tab-content">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                    
                    <!-- Columna Izquierda: Entrada de datos -->
                    <div class="flex flex-col gap-4">
                        <div>
                            <label for="detectorInput" class="block text-sm font-semibold text-slate-700 mb-2 flex items-center gap-2">
                                <i data-lucide="search" class="w-4 h-4"></i> Texto a Analizar
                            </label>
                            <textarea id="detectorInput" rows="10" 
                                class="w-full rounded-xl border border-slate-200 p-4 text-slate-700 focus:ring-2 focus:ring-purple-500 focus:border-purple-500 transition-all resize-none outline-none"
                                placeholder="Pega el texto aquí para saber si fue escrito por IA o por un humano..."></textarea>
                        </div>

                        <!-- Botón de Acción -->
                        <button id="detectBtn" onclick="analizarIA()" 
                            class="w-full bg-slate-800 hover:bg-slate-900 text-white font-bold py-3.5 px-6 rounded-xl transition-colors shadow-sm flex justify-center items-center gap-2 mt-2">
                            <i data-lucide="scan-line" class="w-5 h-5"></i>
                            <span>Escanear Texto</span>
                        </button>
                        
                        <!-- Mensaje de error/estado -->
                        <div id="detectorStatusMessage" class="hidden text-sm p-3 rounded-lg mt-2 text-center font-medium"></div>
                    </div>

                    <!-- Columna Derecha: Resultado del Detector -->
                    <div class="flex flex-col gap-4">
                        <label class="block text-sm font-semibold text-slate-700 mb-2 flex items-center gap-2">
                            <i data-lucide="bar-chart-2" class="w-4 h-4 text-purple-500"></i> Resultados del Análisis
                        </label>
                        
                        <!-- Área de Resultado -->
                        <div id="detectorResultArea" class="w-full h-full min-h-[250px] rounded-xl border border-slate-200 bg-slate-50 p-6 flex flex-col justify-center items-center relative">
                            
                            <p id="detectorPlaceholder" class="text-slate-400 italic text-center">
                                Esperando texto para escanear...
                            </p>

                            <!-- Medidor de Resultados (Oculto por defecto) -->
                            <div id="detectorGauge" class="hidden w-full flex flex-col items-center">
                                <div class="text-center mb-4">
                                    <span id="aiPercentage" class="text-6xl font-black text-slate-800">0%</span>
                                    <p class="text-slate-500 font-medium uppercase tracking-wider text-sm mt-1">Probabilidad de IA</p>
                                </div>

                                <!-- Barra de progreso -->
                                <div class="w-full bg-slate-200 rounded-full h-4 mb-2 overflow-hidden">
                                    <div id="aiProgressBar" class="bg-red-500 h-4 rounded-full transition-all duration-1000 ease-out" style="width: 0%"></div>
                                </div>
                                <div class="w-full flex justify-between text-xs text-slate-400 font-medium mb-6">
                                    <span>Humano</span>
                                    <span>Mixto</span>
                                    <span>IA</span>
                                </div>

                                <!-- Caja de explicación -->
                                <div class="w-full bg-white p-4 rounded-lg border border-slate-100 shadow-sm">
                                    <h4 class="text-sm font-bold text-slate-700 mb-1 flex items-center gap-1">
                                        <i data-lucide="info" class="w-4 h-4"></i> Veredicto:
                                    </h4>
                                    <p id="aiExplanation" class="text-slate-600 text-sm leading-relaxed"></p>
                                </div>
                            </div>

                        </div>
                    </div>
                </div>
            </div>

        </main>
        
        <footer class="text-center mt-8 text-slate-400 text-sm">
            <p>Impulsado por Gemini AI</p>
        </footer>
    </div>

    <script>
        // Inicializar iconos
        lucide.createIcons();

        // IMPORTANTE: Si descargas esto, asegúrate de pegar tu API Key de nuevo aquí
        const apiKey = ""; 
        const modeloIA = "gemini-2.5-flash-preview-09-2025";
        const API_URL = `https://generativelanguage.googleapis.com/v1beta/models/${modeloIA}:generateContent?key=${apiKey}`;

        // ==========================================
        // LÓGICA DE PESTAÑAS
        // ==========================================
        function switchTab(tabName) {
            // Ocultar todas las pestañas
            document.getElementById('humanizerTab').classList.remove('active');
            document.getElementById('detectorTab').classList.remove('active');
            
            // Resetear estilos de los botones
            const btnHumanizer = document.getElementById('btnHumanizer');
            const btnDetector = document.getElementById('btnDetector');
            
            btnHumanizer.className = "flex items-center gap-2 px-6 py-2.5 rounded-full font-bold bg-white text-slate-600 border border-slate-200 hover:bg-slate-50 transition-all";
            btnDetector.className = "flex items-center gap-2 px-6 py-2.5 rounded-full font-bold bg-white text-slate-600 border border-slate-200 hover:bg-slate-50 transition-all";

            // Activar la pestaña seleccionada
            if (tabName === 'humanizer') {
                document.getElementById('humanizerTab').classList.add('active');
                btnHumanizer.className = "flex items-center gap-2 px-6 py-2.5 rounded-full font-bold bg-blue-600 text-white shadow-md transition-all";
            } else {
                document.getElementById('detectorTab').classList.add('active');
                btnDetector.className = "flex items-center gap-2 px-6 py-2.5 rounded-full font-bold bg-slate-800 text-white shadow-md transition-all";
            }
        }

        // ==========================================
        // LÓGICA DEL HUMANIZADOR (Pestaña 1)
        // ==========================================
        const levelSlider = document.getElementById('levelSlider');
        const levelValue = document.getElementById('levelValue');
        
        levelSlider.addEventListener('input', function() {
            levelValue.textContent = this.value;
        });

        async function procesarTexto() {
            const inputText = document.getElementById('inputText').value.trim();
            const toneSelect = document.getElementById('toneSelect');
            const tono = toneSelect.options[toneSelect.selectedIndex].text;
            const nivel = document.getElementById('levelSlider').value;

            if (inputText.length < 10) {
                mostrarMensaje('statusMessage', "El texto es demasiado corto. Por favor, escribe un poco más.", "error");
                return;
            }

            estadoCargando(true, 'humanizeBtn', 'resultArea', 'placeholderText', 'outputText', 'copyBtn', 'Analizando y humanizando tu texto...', 'blue');
            mostrarMensaje('statusMessage', "", "none");

            // ¡NUEVO PROMPT SUPER AGRESIVO PARA EVADIR DETECTORES!
            const systemPrompt = `Eres un experto redactor humano y "ghostwriter". Tu objetivo absoluto es reescribir este texto para que sea IMPOSIBLE que un detector de IA (como GPTZero o Turnitin) sepa que fue generado por máquina.
            
            Reglas CRÍTICAS de evasión:
            1. TONO Y ESTILO: '${tono}'. Actúa 100% como un humano escribiendo en este tono.
            2. CAOS ESTRUCTURAL (Burstiness): Alterna drásticamente. Escribe una oración de 3 palabras. Luego una de 30. Crea párrafos de una sola línea. A los detectores de IA les asusta el formato irregular.
            3. PALABRAS PROHIBIDAS: NUNCA uses "En resumen", "En conclusión", "Es importante destacar", "Un tapiz", "Vertiginoso", "Sin embargo", "Además", "Crucial".
            4. DEFECTOS HUMANOS: Los humanos divagan. Usa conectores naturales ("Mira,", "O sea,", "La verdad es que", "Y bueno,", "De hecho,"). Usa preguntas retóricas.
            5. NIVEL DE EXPRESIÓN: Nivel ${nivel}/10. Si es mayor a 7, rompe las reglas tradicionales de redacción de ensayos, sé muy conversacional y ligeramente asimétrico.
            
            Devuelve ÚNICAMENTE el texto reescrito, sin comillas, introducciones ni comentarios.`;

            const payload = {
                contents: [{ parts: [{ text: `Reescribe esto:\n\n${inputText}` }] }],
                systemInstruction: { parts: [{ text: systemPrompt }] }
            };

            try {
                const responseData = await fetchConReintentos(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const textoFinal = responseData.candidates?.[0]?.content?.parts?.[0]?.text;

                if (textoFinal) {
                    mostrarResultado(textoFinal, 'resultArea', 'placeholderText', 'outputText', 'copyBtn');
                    mostrarMensaje('statusMessage', "¡Texto humanizado con éxito!", "success");
                } else {
                    throw new Error("Respuesta inválida de la IA.");
                }
            } catch (error) {
                mostrarMensaje('statusMessage', `⚠️ Error al procesar: ${error.message}`, "error");
            } finally {
                estadoCargando(false, 'humanizeBtn', 'resultArea', 'placeholderText', 'outputText', 'copyBtn', '', 'blue', 'Humanizar Texto', 'wand-2');
            }
        }

        // ==========================================
        // LÓGICA DEL DETECTOR DE IA (Pestaña 2)
        // ==========================================
        async function analizarIA() {
            const inputText = document.getElementById('detectorInput').value.trim();

            if (inputText.length < 20) {
                mostrarMensaje('detectorStatusMessage', "El texto es demasiado corto para analizar. Pega al menos un párrafo.", "error");
                return;
            }

            // Preparar UI del detector
            estadoCargando(true, 'detectBtn', 'detectorResultArea', 'detectorPlaceholder', 'detectorGauge', null, 'Escaneando patrones de IA...', 'slate');
            mostrarMensaje('detectorStatusMessage', "", "none");
            document.getElementById('detectorGauge').classList.add('hidden'); // Ocultar gráfica previa

            // PROMPT DEL DETECTOR CALIBRADO PARA EVITAR FALSOS POSITIVOS
            const systemPrompt = `Eres un detector avanzado de Inteligencia Artificial. Analiza el texto y determina la probabilidad exacta de que haya sido generado por IA.
            
            Busca:
            - Baja "Burstiness" (oraciones casi todas de la misma longitud).
            - Baja "Perplexity" (uso de palabras extremadamente predecibles).
            - Clichés de IA ("en conclusión", "es crucial notar", "un tapiz").
            
            ATENCIÓN (Regla contra falsos positivos): Los humanos también pueden escribir textos profesionales, con excelente ortografía y estructura lógica. NO penalices un texto solo porque está bien escrito. Penalízalo si es "robóticamente neutral", predecible o aburrido.
            
            Debes responder ESTRICTAMENTE con un objeto JSON válido, con esta estructura:
            {"porcentaje_ia": <numero del 0 al 100>, "explicacion": "<Breve explicación directa>"}
            
            NO incluyas texto fuera del JSON.`;

            const payload = {
                contents: [{ parts: [{ text: `Analiza este texto:\n\n${inputText}` }] }],
                systemInstruction: { parts: [{ text: systemPrompt }] }
            };

            try {
                const responseData = await fetchConReintentos(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                let respuestaTexto = responseData.candidates?.[0]?.content?.parts?.[0]?.text || "";
                
                // Limpiar posibles etiquetas markdown que la IA a veces añade (```json ... ```)
                respuestaTexto = respuestaTexto.replace(/```json/gi, '').replace(/```/g, '').trim();
                
                let resultadoJSON;
                try {
                    resultadoJSON = JSON.parse(respuestaTexto);
                } catch (e) {
                    throw new Error("No se pudo interpretar el análisis de la IA.");
                }

                if (resultadoJSON && typeof resultadoJSON.porcentaje_ia !== 'undefined') {
                    mostrarResultadoDetector(resultadoJSON.porcentaje_ia, resultadoJSON.explicacion);
                } else {
                    throw new Error("La estructura de la respuesta no es válida.");
                }

            } catch (error) {
                document.getElementById('detectorPlaceholder').classList.remove('hidden');
                document.getElementById('detectorPlaceholder').textContent = "Esperando texto para escanear...";
                mostrarMensaje('detectorStatusMessage', `⚠️ Error al escanear: ${error.message}`, "error");
            } finally {
                estadoCargando(false, 'detectBtn', 'detectorResultArea', 'detectorPlaceholder', 'detectorGauge', null, '', 'slate', 'Escanear Texto', 'scan-line');
            }
        }

        function mostrarResultadoDetector(porcentaje, explicacion) {
            document.getElementById('detectorPlaceholder').classList.add('hidden');
            document.getElementById('detectorGauge').classList.remove('hidden');
            
            const numPercentage = parseInt(porcentaje);
            const spanPercentage = document.getElementById('aiPercentage');
            const progressBar = document.getElementById('aiProgressBar');
            const textExplicacion = document.getElementById('aiExplanation');

            // Actualizar textos
            spanPercentage.textContent = `${numPercentage}%`;
            textExplicacion.textContent = explicacion;

            // Animar barra
            setTimeout(() => {
                progressBar.style.width = `${numPercentage}%`;
            }, 100);

            // Cambiar colores según el riesgo
            progressBar.className = "h-4 rounded-full transition-all duration-1000 ease-out";
            spanPercentage.className = "text-6xl font-black";
            
            if (numPercentage <= 20) {
                // Humano
                progressBar.classList.add('bg-green-500');
                spanPercentage.classList.add('text-green-600');
            } else if (numPercentage <= 60) {
                // Mixto / Dudoso
                progressBar.classList.add('bg-orange-400');
                spanPercentage.classList.add('text-orange-500');
            } else {
                // Altamente IA
                progressBar.classList.add('bg-red-500');
                spanPercentage.classList.add('text-red-600');
            }
        }

        // ==========================================
        // FUNCIONES COMPARTIDAS
        // ==========================================
        async function fetchConReintentos(url, options, maxReintentos = 3) {
            const tiemposDeEspera = [1000, 2000, 4000];
            for (let i = 0; i < maxReintentos; i++) {
                try {
                    const response = await fetch(url, options);
                    if (!response.ok) {
                        let errorMsg = `HTTP Error ${response.status}`;
                        try {
                            const errorData = await response.json();
                            if (errorData.error && errorData.error.message) errorMsg = errorData.error.message;
                        } catch (e) {}
                        throw new Error(errorMsg);
                    }
                    return await response.json();
                } catch (error) {
                    if (i === maxReintentos - 1) throw error;
                    await new Promise(resolve => setTimeout(resolve, tiemposDeEspera[i]));
                }
            }
        }

        // Función dinámica para manejar los estados de carga de ambas pestañas
        function estadoCargando(cargando, btnId, areaId, placeholderId, contentId, copyBtnId, msjCarga, color, originalText, originalIcon) {
            const btn = document.getElementById(btnId);
            const area = document.getElementById(areaId);
            const placeholder = document.getElementById(placeholderId);
            const content = document.getElementById(contentId);
            const copyBtn = copyBtnId ? document.getElementById(copyBtnId) : null;

            if (cargando) {
                btn.disabled = true;
                btn.innerHTML = `<span class="loader"></span><span>Procesando...</span>`;
                btn.classList.replace(`bg-${color}-600`, `bg-${color}-400`);
                if(color === 'slate') btn.classList.replace('bg-slate-800', 'bg-slate-500');
                
                placeholder.classList.remove('hidden');
                placeholder.textContent = msjCarga;
                content.classList.add('hidden');
                if(copyBtn) copyBtn.classList.add('hidden');
                area.classList.remove('bg-white');
                area.classList.add('bg-slate-50');
            } else {
                btn.disabled = false;
                btn.innerHTML = `<i data-lucide="${originalIcon}" class="w-5 h-5"></i><span>${originalText}</span>`;
                btn.classList.replace(`bg-${color}-400`, `bg-${color}-600`);
                if(color === 'slate') btn.classList.replace('bg-slate-500', 'bg-slate-800');
                lucide.createIcons();
            }
        }

        function mostrarResultado(texto, areaId, placeholderId, contentId, copyBtnId) {
            document.getElementById(placeholderId).classList.add('hidden');
            document.getElementById(contentId).textContent = texto;
            document.getElementById(contentId).classList.remove('hidden');
            document.getElementById(copyBtnId).classList.remove('hidden');
            document.getElementById(areaId).classList.remove('bg-slate-50');
            document.getElementById(areaId).classList.add('bg-white');
        }

        function mostrarMensaje(elementId, texto, tipo) {
            const el = document.getElementById(elementId);
            if (tipo === "none") {
                el.classList.add('hidden');
                return;
            }
            
            el.textContent = texto;
            el.classList.remove('hidden', 'bg-red-100', 'text-red-700', 'bg-green-100', 'text-green-700');
            
            if (tipo === "error") {
                el.classList.add('bg-red-100', 'text-red-700');
            } else if (tipo === "success") {
                el.classList.add('bg-green-100', 'text-green-700');
                setTimeout(() => {
                    if(el.textContent === texto) el.classList.add('hidden');
                }, 5000);
            }
        }

        function copiarAlPortapapeles(sourceId, btnId) {
            const textoCopia = document.getElementById(sourceId).textContent;
            const areaTemporal = document.createElement("textarea");
            areaTemporal.value = textoCopia;
            document.body.appendChild(areaTemporal);
            areaTemporal.select();
            
            const copyBtn = document.getElementById(btnId);
            try {
                document.execCommand('copy');
                const originalHTML = copyBtn.innerHTML;
                copyBtn.innerHTML = '<i data-lucide="check" class="w-4 h-4 text-green-600"></i> <span class="text-green-600">¡Copiado!</span>';
                lucide.createIcons();
                
                setTimeout(() => {
                    copyBtn.innerHTML = originalHTML;
